services:
  app:
    build: .
    container_name: streamlit_app
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    restart: unless-stopped
  
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    env_file:
      - .env
    volumes:
      - ./nginx/conf/app.conf.template:/etc/nginx/templates/app.conf.template
      - ./scripts/nginx-entrypoint.sh:/entrypoint.sh
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      - app

  certbot-init:
    image: certbot/certbot
    env_file:
      - .env
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - ./scripts/init-letsencrypt.sh:/init.sh
    entrypoint: ["/bin/sh", "/init.sh"]
    depends_on:
      - nginx

  certbot:
    image: certbot/certbot
    env_file:
      - .env
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "while :; do
      sleep 12h;
      certbot renew --webroot -w /var/www/certbot;
      done"
