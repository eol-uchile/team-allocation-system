<div style="font-family: sans-serif; color: #222; line-height: 1.5;">
    <p>Hi {recipient_name},</p>
    <p>You have received a new inquiry regarding the <strong>Poverty Alleviation Challenge</strong>.</p>
    
    <div style="background-color: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #eee; margin: 20px 0;">
        <p style="margin-top: 0; font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 0.5px;">Message from {sender_email}:</p>
        <p style="white-space: pre-wrap; margin-bottom: 0;">{message_body}</p>
    </div>

    <p>To reply, please email <strong>{sender_email}</strong> directly.</p>
    
    <hr style="border: none; border-top: 1px solid #eee; margin-top: 20px;" />
    <p style="font-size: 12px; color: #888;">
        This is a connection request sent via the Poverty Alleviation Challenge platform.
    </p>
</div>
